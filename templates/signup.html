{% extends "base.html" %}
{% block title %}Sign up · ZenCV{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-7 col-lg-5">
    <div class="card p-4 p-md-5 reveal">
      <div class="text-center mb-4">
        <div class="auth-logo mx-auto mb-3"><i class="bi bi-stars"></i></div>
        <h2 class="fw-bold mb-1">Join <span class="gradient-text">ZenCV</span></h2>
        <p class="text-muted small mb-0">Free, no card required · powered by Clyra</p>
      </div>

      <form method="post" action="{{ url_for('auth.signup') }}" novalidate>
        <div class="mb-3">
          <label class="form-label">Full name</label>
          <input type="text" name="name" class="form-control" required autofocus
                 value="{{ name or '' }}" placeholder="Jane Doe">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required
                 value="{{ email or '' }}" placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required
                 minlength="8" placeholder="At least 8 characters">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm" class="form-control" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">
          <i class="bi bi-person-plus me-1"></i> Sign up
        </button>
      </form>

      <div class="text-center mt-4 small text-muted">
        Sign up to start using ZenCV right away.
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Log in · ZenCV{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-7 col-lg-5">
    <div class="card p-4 p-md-5 reveal">
      <div class="text-center mb-4">
        <div class="auth-logo mx-auto mb-3"><i class="bi bi-stars"></i></div>
        <h2 class="fw-bold mb-1">Welcome back to <span class="gradient-text">ZenCV</span></h2>
        <p class="text-muted small mb-0">Log in to continue.</p>
      </div>

      <form method="post" action="{{ url_for('auth.login') }}" novalidate>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required autofocus
                 value="{{ email or '' }}" placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required
                 placeholder="••••••••" minlength="8">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label small" for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">
          <i class="bi bi-box-arrow-in-right me-1"></i> Log in
        </button>
      </form>

      <div class="text-center mt-4 small text-muted">
        New here?
        <a href="{{ url_for('auth.signup') }}" class="fw-semibold text-decoration-none">Create an account</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
